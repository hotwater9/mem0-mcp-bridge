services:
  qdrant:
    image: qdrant/qdrant:v1.12.1
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"   # 浏览器访问 dashboard：http://<server>:6333/dashboard
    networks: [memnet]

  bridge:
    build:
      context: ./bridge
    restart: unless-stopped
    depends_on:
      - qdrant
    environment:
      LITELLM_BASE_URL: ${LITELLM_BASE_URL}
      LITELLM_API_KEY: ${LITELLM_API_KEY}
      LITELLM_CHAT_MODEL: ${LITELLM_CHAT_MODEL:-claude-sonnet-4-6}
      LITELLM_EMBED_MODEL: ${LITELLM_EMBED_MODEL:-text-embedding-3-large}
      EMBED_DIMS: ${EMBED_DIMS:-3072}
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      QDRANT_COLLECTION: memories
      SHARED_TOKEN: ${SHARED_TOKEN}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - bridge_state:/state   # persists /state/metrics.db across restarts
    ports:
      - "8765:8765"
    networks: [memnet]

volumes:
  qdrant_data:
  bridge_state:

networks:
  memnet:
